plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id 'io.github.gradle-nexus.publish-plugin' version '2.0.0'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    // Add here additional repositories if required by some of the dependencies below.
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // JNA is already provided by NeoForge at runtime (as a JPMS module).
    // Only declare it for compile-time; do NOT bundle it via jarJar — that
    // causes "Module com.sun.jna reads another module named com.sun.jna".
    compileOnly 'net.java.dev.jna:jna:5.14.0'
    compileOnly 'net.java.dev.jna:jna-platform:5.14.0'

    // Example optional mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-neoforge-api:${jei_version}"
    // We add the full version to localRuntime, not runtimeOnly, so that we do not publish a dependency on it
    // localRuntime "mezz.jei:jei-${mc_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Publishing to Maven Central via Sonatype OSSRH / central.sonatype.com.
// groupId:  io.github.cat1914   (registered in gradle.properties as mod_group_id)
//
// All credentials and signing material are read from environment variables /
// Gradle properties at publish time. They are NEVER hardcoded in this file.
//
// Required env vars / properties (provided by GitHub Actions Secrets in CI):
//   OSSRH_USERNAME   Sonatype account user
//   OSSRH_TOKEN      Sonatype account password
//   GPG_KEY_ID       8-char short key id            e.g. ABCD1234
//   GPG_PASSPHRASE   passphrase of the GPG key      (only for local dev; CI uses keyring)
//
// In GitHub Actions, the key material is imported into a temporary keyring by
// the `import-gpg` step before this is invoked. We rely on `signing.useInMemoryPgpKeys`.
//
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java

            groupId = mod_group_id
            artifactId = 'waterfall'
            version = mod_version

            pom {
                name = mod_name
                description = 'A real physics simulation engine for Minecraft, integrating the heavy C++ engine for accurate physics calculations, including underwater physics, sub-dimension support, and realistic forces.'
                url = 'https://github.com/cat1914/Waterfall'
                licenses {
                    license {
                        name = 'GNU General Public License v3.0'
                        url = 'https://www.gnu.org/licenses/gpl-3.0.txt'
                    }
                }
                developers {
                    developer {
                        id = 'cat1914'
                        name = 'cat1914'
                        url = 'https://github.com/cat1914'
                    }
                }
                scm {
                    url = 'https://github.com/cat1914/Waterfall'
                    connection = 'scm:git:git://github.com/cat1914/Waterfall.git'
                    developerConnection = 'scm:git:ssh://git@github.com/cat1914/Waterfall.git'
                    tag = 'v' + mod_version
                }
            }
        }
    }
    repositories {
        // Local file repo — handy for `gradle publishToMavenLocal` / smoke tests.
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

// GPG signing of all published artifacts.
// `useInMemoryPgpKeys` must be called with non-null Strings at *configuration*
// time, otherwise no signer is configured and :signMavenJavaPublication fails
// with "没有配置的签署者" / "no configured signers".
//
// Key resolution order (first non-null wins):
//   1. Gradle property GPG_KEY_FILE  -> path to ASCII-armored key file
//      (preferred: multi-line key survives GitHub Actions ${{ }} interpolation
//       better when read from a file than from an env var, which folds newlines)
//   2. Gradle property GPG_KEY       -> ASCII-armored key as inline String
//   3. Env GPG_KEY_FILE / GPG_KEY
//
// Passphrase resolution (first non-null wins):
//   Gradle property GPG_PASSPHRASE -> env GPG_PASSPHRASE -> env
//   ORG_GRADLE_PROJECT_GPG_PASSPHRASE
//   (passphrase is single-line, env is fine)
signing {
    def gpgKeyFile = findProperty('GPG_KEY_FILE') ?: System.getenv('GPG_KEY_FILE')
    def gpgKeyInline = findProperty('GPG_KEY')    ?: System.getenv('GPG_KEY')
    def gpgKeyResolved
    if (gpgKeyFile) {
        def f = file(gpgKeyFile.toString())
        if (!f.exists()) {
            throw new GradleException("GPG_KEY_FILE points at ${f.path} but the file does not exist.")
        }
        gpgKeyResolved = f.text
    } else {
        gpgKeyResolved = gpgKeyInline
    }
    if (gpgKeyResolved == null || gpgKeyResolved.toString().trim().isEmpty()) {
        throw new GradleException(
            'GPG_KEY (or GPG_KEY_FILE) is not set. Provide the ASCII-armored ' +
            'PGP private key via Gradle property, environment variable, or ' +
            'GitHub Actions secret.'
        )
    }
    if (!gpgKeyResolved.toString().contains('BEGIN PGP PRIVATE KEY BLOCK')) {
        throw new GradleException(
            'Resolved GPG key does not contain a PGP PRIVATE KEY BLOCK header. ' +
            'It was likely truncated — prefer GPG_KEY_FILE to GPG_KEY when the ' +
            'value is multi-line.'
        )
    }
    def gpgPass = (findProperty('GPG_PASSPHRASE') ?: System.getenv('GPG_PASSPHRASE')) ?: System.getenv('ORG_GRADLE_PROJECT_GPG_PASSPHRASE')
    if (gpgPass == null) gpgPass = ''
    useInMemoryPgpKeys(gpgKeyResolved.toString(), gpgPass.toString())
    sign publishing.publications.mavenJava
}

// Sonatype / Maven Central publish configuration.
// NOTE: OSSRH (https://oss.sonatype.org) reached EOL on 2025-06-30.
// The current publish target is Sonatype Central at
//   https://ossrh-staging-api.central.sonatype.com/service/local/
// (per gradle-nexus/publish-plugin docs:
//  https://central.sonatype.org/publish/publish-portal-ossrh-staging-api/#configuration)
//
// Required env vars / properties (GitHub Actions Secrets in CI):
//   OSSRH_USERNAME   central.sonatype.com user token (Account > Generate User Token)
//   OSSRH_TOKEN      central.sonatype.com user token password
nexusPublishing {
    packageGroup = 'io.github.cat1914'

    repositories {
        sonatype {
            // Required for the new Central publishing portal.
            // The plugin's default URL points to the legacy oss.sonatype.org
            // which now returns HTTP 402 Payment Required.
            nexusUrl = uri('https://ossrh-staging-api.central.sonatype.com/service/local/')
            snapshotRepositoryUrl = uri('https://central.sonatype.com/repository/maven-snapshots/')

            // The new portal accepts user tokens (recommended). NEVER hardcode.
            username = findProperty('OSSRH_USERNAME') ?: System.getenv('OSSRH_USERNAME')
            password = findProperty('OSSRH_TOKEN')    ?: System.getenv('OSSRH_TOKEN')
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// Exclude the standalone smoke-test and example classes from the published mod jar.
// HeavySmokeTest has a main() entry point and is only meant for manual
// verification of the native library binding, not for distribution.
// WaterfallPhysicsExample is a demonstration mod (@Mod("waterfall_example"))
// that has no corresponding [[mods]] entry in neoforge.mods.toml — shipping it
// causes "Cowardly refusing to send event ... to a broken mod state" crashes.
processResources {
    exclude 'com/waterfall/natives/HeavySmokeTest.class'
}
jar {
    exclude 'com/waterfall/natives/HeavySmokeTest.class'
    exclude 'com/waterfall/natives/HeavySmokeTest*.class'
    exclude 'com/waterfall/example/**'
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
