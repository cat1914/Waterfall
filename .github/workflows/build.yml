name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          # Only init one level of submodules. The direction submodule contains
          # a circular Waterfall reference that breaks `submodules: recursive`.
          submodules: true

      - name: Init submodules (first level only)
        run: |
          git submodule sync
          git submodule update --init

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: waterfall-mod-jar
          path: |
            build/libs/*.jar
          if-no-files-found: error
