name: Release to Maven Central

# 发布到 Sonatype / Maven Central。
# 触发：推送形如 v1.2.3 的 tag（如需手动触发可改用 workflow_dispatch）。
# 凭据：所有敏感信息都从 GitHub Actions Secrets 读取，仓库里没有任何密钥。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Init submodules (first level only, no recursion)
        run: |
          git submodule sync
          git submodule update --init

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 把 GPG 私钥导入到 runner 的临时 keyring，供 Gradle 签名使用。
      # 三个 Secrets：
      #   GPG_PRIVATE_KEY     -----BEGIN PGP PRIVATE KEY BLOCK----- ... 的 ASCII-armored 内容
      #   GPG_PASSPHRASE      私钥的 passphrase
      #   GPG_KEY_ID          8 位 short key id（可选，仅用于日志展示）
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          # 把 ASCII-armored 私钥写入临时文件，再用 --batch --pinentry-mode loopback 导入
          KEY_FILE="$(mktemp)"
          printf '%s' "$GPG_PRIVATE_KEY" > "$KEY_FILE"
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --import "$KEY_FILE"
          rm -f "$KEY_FILE"
          # 列出已导入的密钥，便于排查
          gpg --list-secret-keys --keyid-format=long

      # 同步 mod_version 与 tag（去掉 v 前缀）—— 防止本地版本与 tag 不一致。
      # 必要时用 sed 改 gradle.properties，但默认 mod_version 应已匹配。
      - name: Sync mod_version with tag (drop v prefix)
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"
          sed -i "s/^mod_version=.*/mod_version=$TAG_VERSION/" gradle.properties
          echo "Updated mod_version in gradle.properties"
          grep '^mod_version=' gradle.properties

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN:    ${{ secrets.OSSRH_TOKEN }}
        run: |
          ./gradlew publishMavenJavaPublicationToSonatypeRepository \
                      closeSonatypeStagingRepository
          # closeSonatypeStagingRepository 会让 Sonatype 触发 Central 同步；
          # nexus-publish-plugin 还提供了 releaseSonatypeStagingRepository 手动放行；
          # 新 central.sonatype.com portal 通常自动 promote。

      - name: Verify (optional)
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN:    ${{ secrets.OSSRH_TOKEN }}
        run: |
          ./gradlew publishMavenJavaPublicationToSonatypeRepository \
                      closeAndReleaseSonatypeStagingRepository
