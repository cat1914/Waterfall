name: Release to Maven Central

# 发布到 Sonatype / Maven Central。
# 触发：推送形如 v1.2.3 的 tag（如需手动触发可改用 workflow_dispatch）。
# 凭据：所有敏感信息都从 GitHub Actions Secrets 读取，仓库里没有任何密钥。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Init submodules (first level only, no recursion)
        run: |
          git submodule sync
          git submodule update --init

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 同步 mod_version 与 tag（去掉 v 前缀）—— 防止本地版本与 tag 不一致。
      - name: Sync mod_version with tag (drop v prefix)
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"
          sed -i "s/^mod_version=.*/mod_version=$TAG_VERSION/" gradle.properties
          echo "Updated mod_version in gradle.properties"
          grep '^mod_version=' gradle.properties

      # 验证 GPG 公钥已发布到公钥服务器。Maven Central 通过公钥指纹验证签名，
      # 必须能从 keyserver 下载到。私钥以 ASCII-armored 形式传给 Gradle 的
      # useInMemoryPgpKeys() 内存签名（不经 keyring 中转），passphrase 通过
      # Gradle property 传入。
      - name: Verify GPG public key on keyserver
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_KEY_ID:-}" ]; then
            echo "GPG_KEY_ID secret not set; skipping keyserver check"
            exit 0
          fi
          echo "Looking up $GPG_KEY_ID on keys.openpgp.org ..."
          if gpg --batch --keyserver hkps://keys.openpgp.org --recv-keys "$GPG_KEY_ID" 2>&1; then
            echo "Public key present on keys.openpgp.org"
          else
            echo "::warning::Public key NOT found on keys.openpgp.org. Upload with:"
            echo "  gpg --armor --export $GPG_KEY_ID | curl -T - https://keys.openpgp.org/upload"
          fi

      # 私钥多行字符串通过 ${{ }} 插值进 env 会被规范化（换行折叠成空格），
      # 导致 ASCII-armored PGP 块被破坏，Gradle 拿到的是坏数据。
      # 改为：先把私钥写到 runner 上的临时文件，再让 Gradle 通过 file()
      # 直接读文件。passphrase 单行，可以走 env。
      #
      # 注意：GitHub Actions 的 `secrets` 上下文在 `##[debug]Evaluating: secrets.XXX`
      # 这类日志里只会输出 '***'，对名称拼写错误非常不友好。下面用
      # $GITHUB_ENV dump 把当前所有与 gpg 相关的 secret 是否被求值打印出来。
      - name: Materialize GPG private key file
        env:
          # 接受多个候选名以适配不同的命名习惯。GITHUB Actions 解析空字符串
          # 和不存在的 secret 等价——所以一旦用 || 链起来，第一个非空就生效。
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY || secrets.GPG_KEY || secrets.GPG_PRIVATEKEY || secrets.PRIVATE_KEY || '' }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE  || secrets.GPG_PASS    || secrets.PASSPHRASE           || '' }}
        run: |
          set -euo pipefail
          echo "::group::GPG secret diagnostics"
          echo "[diag] RUNNER_TEMP=$RUNNER_TEMP"
          # 打印每个候选名是否被解析为非空（不打印内容，只打印长度 / set|unset）。
          # 不能用 ${!name} 间接展开——避免 set -u + eval 类坑。
          for pair in \
            "GPG_PRIVATE_KEY:GPG_PRIVATE_KEY" \
            "GPG_KEY:GPG_PRIVATE_KEY" \
            "GPG_PRIVATEKEY:GPG_PRIVATE_KEY" \
            "PRIVATE_KEY:GPG_PRIVATE_KEY" \
            "GPG_PASSPHRASE:GPG_PASSPHRASE" \
            "GPG_PASS:GPG_PASSPHRASE" \
            "PASSPHRASE:GPG_PASSPHRASE"; do
            actual="${pair%%:*}"
            label="${pair##*:}"
            v="${!actual:-}"
            echo "[diag] env $actual (-> $label): $([ -n "$v" ] && echo "set, length=${#v}" || echo 'unset')"
          done
          echo "::endgroup::"

          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::No GPG private key secret was injected. None of GPG_PRIVATE_KEY / GPG_KEY / GPG_PRIVATEKEY / PRIVATE_KEY resolved to a non-empty value. Verify the secret exists in the repo settings (Secrets and variables > Actions > Repository secrets) and the name is one of the candidates above."
            exit 1
          fi

          KEY_PATH="$RUNNER_TEMP/gpg-private.key"
          printf '%s' "$GPG_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "[diag] wrote $(wc -c < "$KEY_PATH") bytes to $KEY_PATH"
          echo "[diag] head: $(head -1 "$KEY_PATH")"
          echo "[diag] tail: $(tail -1 "$KEY_PATH")"
          echo "[diag] BEGIN marker count: $(grep -c 'BEGIN PGP PRIVATE KEY BLOCK' "$KEY_PATH" || true)"
          echo "[diag] END   marker count: $(grep -c 'END PGP PRIVATE KEY BLOCK'   "$KEY_PATH" || true)"
          echo "GPG_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN:    ${{ secrets.OSSRH_TOKEN }}
          # passphrase 单行，走 env（多个候选名）。
          ORG_GRADLE_PROJECT_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE || secrets.GPG_PASS || secrets.PASSPHRASE || '' }}
          ORG_GRADLE_PROJECT_GPG_KEY_FILE:  ${{ env.GPG_KEY_PATH }}
        run: |
          echo "[diag] ORG_GRADLE_PROJECT_GPG_KEY_FILE=$ORG_GRADLE_PROJECT_GPG_KEY_FILE"
          if [ -z "${ORG_GRADLE_PROJECT_GPG_KEY_FILE:-}" ]; then
            echo "::error::ORG_GRADLE_PROJECT_GPG_KEY_FILE is empty. GITHUB_ENV propagation failed between steps."
            exit 1
          fi
          ls -la "$ORG_GRADLE_PROJECT_GPG_KEY_FILE"
          ./gradlew publishMavenJavaPublicationToSonatypeRepository \
                      closeSonatypeStagingRepository \
                      --no-build-cache
          # closeSonatypeStagingRepository 让 Sonatype 触发 Central 同步；
          # 新 central.sonatype.com portal 通常自动 promote。
